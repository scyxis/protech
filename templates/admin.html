<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProTech - Administração</title>
<style>
/* Estilos similares ao tecnico.html com adições para admin */
.admin-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 30px 20px;
  position: relative;
  z-index: 2;
}

.usuarios-table {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;
  margin-top: 20px;
}

.usuarios-table th,
.usuarios-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.usuarios-table th {
  background: rgba(79,163,255,0.2);
  color: #4fa3ff;
}

.role-select {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(79,163,255,0.3);
  color: #fff;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-salvar-role {
  background: #4fa3ff;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 8px;
}

.btn-salvar-role:hover {
  background: #3b8be3;
}

.badge-admin {
  background: #8b5cf6;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
}

.badge-tecnico {
  background: #3b82f6;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
}

.badge-user {
  background: #6b7280;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
}
</style>
</head>
<body>
<!-- Conteúdo similar ao tecnico.html mas com tabela de usuários e estatísticas -->
</body>
</html>
