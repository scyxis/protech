<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ProTech</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 2;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 15, 26, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(79, 163, 255, 0.2);
}

.navbar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo .pro { color: #fff; }
.logo .tech {
  background: linear-gradient(135deg, #4fa3ff, #9bd4ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

nav {
  display: flex;
  gap: 12px;
  align-items: center;
}

nav a {
  padding: 8px 16px;
  color: #a0aec0;
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.3s;
  border-radius: 40px;
}

nav a:hover {
  color: #4fa3ff;
  background: rgba(79, 163, 255, 0.1);
}

/* AUTH CONTAINER */
.auth-container {
  min-height: calc(100vh - 200px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  z-index: 2;
}

.auth-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 48px;
  max-width: 450px;
  width: 100%;
  border: 1px solid rgba(79, 163, 255, 0.2);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.auth-card h2 {
  text-align: center;
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #4fa3ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 12px;
}

.auth-card .subtitle {
  text-align: center;
  color: #718096;
  margin-bottom: 32px;
  font-size: 0.9rem;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-group label {
  color: #a0aec0;
  font-weight: 500;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
}

.input-group input {
  padding: 14px 16px;
  border: 1px solid rgba(79, 163, 255, 0.2);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  font-size: 1rem;
  transition: all 0.3s;
  font-family: inherit;
}

.input-group input:focus {
  outline: none;
  border-color: #4fa3ff;
  background: rgba(79, 163, 255, 0.05);
  box-shadow: 0 0 0 3px rgba(79, 163, 255, 0.1);
}

.input-group input::placeholder {
  color: #4a5568;
}

.auth-btn {
  background: linear-gradient(135deg, #4fa3ff, #3b82f6);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 40px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.auth-btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.auth-btn:hover::before {
  width: 300px;
  height: 300px;
}

.auth-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79, 163, 255, 0.3);
}

.auth-footer {
  text-align: center;
  margin-top: 28px;
  color: #718096;
  font-size: 0.85rem;
}

.auth-footer a {
  color: #4fa3ff;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s;
}

.auth-footer a:hover {
  text-decoration: underline;
}

.error-message {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #f87171;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 0.85rem;
  margin-bottom: 16px;
}

.back-home {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  color: #4fa3ff;
  text-decoration: none;
  font-size: 0.85rem;
  transition: all 0.2s;
}

.back-home:hover {
  transform: translateX(-5px);
  color: #6bb4ff;
}

footer {
  background: #050a12;
  text-align: center;
  padding: 24px;
  color: #5a6e8a;
  font-size: 0.8rem;
  border-top: 1px solid rgba(79, 163, 255, 0.1);
  position: relative;
  z-index: 2;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <div class="navbar">
    <h1 class="logo"><span class="pro">Pro</span><span class="tech">Tech</span></h1>
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Início</a>
      <a href="index.html#servicos"><i class="fas fa-tools"></i> Serviços</a>
      <a href="index.html#contato"><i class="fas fa-envelope"></i> Contato</a>
    </nav>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card">
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h2>Bem-vindo de volta</h2>
    <p class="subtitle">Faça login para acessar sua conta</p>
    
    <form class="auth-form" id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <div id="loginError" class="error-message" style="display: none;"></div>
      <button type="submit" class="auth-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    </form>
    <div class="auth-footer">
      Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 ProTech - Tecnologia de ponta para seu dispositivo</p>
</footer>

<script>
const API_URL = 'https://protech-rt8q.onrender.com/api';

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  const submitBtn = document.getElementById('loginBtn');
  const originalText = submitBtn.innerHTML;
  
  errorDiv.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Entrando...';
  
  try {
    const response = await fetch(`${API_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      localStorage.setItem('protech_token', data.token);
      localStorage.setItem('protech_user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    } else {
      errorDiv.textContent = data.error || 'Email ou senha inválidos';
      errorDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
    }
  } catch (error) {
    errorDiv.textContent = 'Erro de conexão com o servidor';
    errorDiv.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
});

// Partículas
const canvas = document.getElementById('particles');
if (canvas) {
  let ctx = canvas.getContext('2d');
  let particles = [];
  
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createParticles() {
    const count = window.innerWidth < 768 ? 40 : 80;
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.2,
        op: Math.random() * 0.3 + 0.1
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(79, 163, 255, ${p.op})`;
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(draw);
  }
  resize(); createParticles(); draw();
  window.addEventListener('resize', () => { resize(); createParticles(); });
}
</script>
</body>
<script src="script-global.js"></script>
</html>
